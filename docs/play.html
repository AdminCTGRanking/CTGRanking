<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessTier Bot | AI Analyzer</title>
    
    <link rel="stylesheet" href="css/tailwind.min.css">
    <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="js/chessboard-1.0.0.min.js"></script>
</head>
<body>

    <div id="login-screen" class="stat-panel" style="max-w: 400px; text-align: center; margin: auto;">
        <h2 style="color: #ca8a04; letter-spacing: 2px; margin-bottom: 5px;">CHESSTIER BOT</h2>
        <p style="font-size: 11px; color: #94a3b8; margin-bottom: 20px;">NHẬP TÊN ĐỂ PHÂN TÍCH CHỈ SỐ AI</p>
        
        <input type="text" id="playerNameInput" placeholder="TÊN CỦA BẠN..." class="input-field">
        <button onclick="startGameWithPlayer()" class="btn-main">Bắt đầu đấu</button>
    </div>

    <div id="game-screen" class="grid-layout hidden">
        <div class="col-board">
            <h3 style="color: #94a3b8; margin-bottom: 15px; font-size: 16px;">HỆ THỐNG ĐÁNH GIÁ CHỈ SỐ AI</h3>
            <div id="myBoard"></div>
            <p id="status" style="color: #eab308; font-weight: bold; margin-top: 15px;">Đến lượt bạn...</p>
        </div>

        <div class="col-stats">
            <div class="stat-panel">
                <div class="flex-between" style="border-bottom: 1px solid #2d3142; padding-bottom: 10px; margin-bottom: 15px;">
                    <span id="display-name" style="font-weight: bold; color: #f1f5f9;">PLAYER</span>
                    <span style="font-size: 11px; background: #334155; padding: 4px 8px; border-radius: 4px;">BOT AI</span>
                </div>

                <div style="margin-bottom: 12px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8;"><span>🧠 INT (Intelligence)</span><span id="int-val" style="color:#3b82f6;">0</span></div>
                    <div class="bar-bg"><div id="int-bar" class="bar-fill" style="background: #3b82f6;"></div></div>
                </div>

                <div style="margin-bottom: 12px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8;"><span>⚡ BIQ (Battle IQ)</span><span id="biq-val" style="color:#ef4444;">0</span></div>
                    <div class="bar-bg"><div id="biq-bar" class="bar-fill" style="background: #ef4444;"></div></div>
                </div>

                <div style="margin-bottom: 12px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8;"><span>🎯 TAC (Tactics)</span><span id="tac-val" style="color:#eab308;">0</span></div>
                    <div class="bar-bg"><div id="tac-bar" class="bar-fill" style="background: #eab308;"></div></div>
                </div>

                <div style="margin-bottom: 15px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8;"><span>🔥 EXP (Experience)</span><span id="exp-val" style="color:#10b981;">0</span></div>
                    <div class="bar-bg"><div id="exp-bar" class="bar-fill" style="background: #10b981;"></div></div>
                </div>

                <div style="text-align: center; border-top: 1px solid #2d3142; padding-top: 15px;">
                    <span style="font-size: 10px; color: #64748b; tracking-wide: 1px;">DỰ ĐOÁN CẤP BẬC</span>
                    <div id="predicted-rank" style="font-size: 20px; font-weight: bold; color: #475569; margin-top: 5px; font-style: italic;">CHƯA XÁC ĐỊNH</div>
                </div>
            </div>
            
            <button onclick="resetGame()" class="btn-main" style="background:#334155; color:#fff; margin-top: 15px;">Chơi ván mới</button>
        </div>
    </div>

    <script>
        let board = null;
        let game = new Chess();
        let $status = $('#status');
        let playerName = "";
        let totalMoves = 0, tacticalMoves = 0, accurateMoves = 0, totalThinkTime = 0, lastMoveTime = Date.now();

        function startGameWithPlayer() {
            let inputName = $('#playerNameInput').val().trim();
            if (!inputName) { alert("Vui lòng nhập tên!"); return; }
            playerName = inputName;
            $('#display-name').html(playerName.toUpperCase());
            $('#login-screen').addClass('hidden');
            $('#game-screen').removeClass('hidden');
            setTimeout(initChessBoard, 150);
        }

        function initChessBoard() {
            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                onDragStart: (src, pc) => !game.game_over() && pc.search(/^b/) === -1,
                onDrop: (src, tgt) => {
                    let move = game.move({ from: src, to: tgt, promotion: 'q' });
                    if (move === null) return 'snapback';
                    
                    let thinkTime = (Date.now() - lastMoveTime) / 1000;
                    totalThinkTime += thinkTime; totalMoves++;
                    if (move.captured || move.san.includes('+')) tacticalMoves++;
                    if (!move.captured && thinkTime < 3) accurateMoves++;

                    $status.html('Bot đang tính toán...');
                    setTimeout(makeBotMove, 600);
                },
                onSnapEnd: () => board.position(game.fen()),
                pieceTheme: 'assets/img/chesspieces/wikipedia/{piece}.png'
            });
            board.resize();
            lastMoveTime = Date.now();
        }

        function makeBotMove() {
            let moves = game.moves();
            if (game.game_over()) { handleEnd(); return; }
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
            if (game.game_over()) handleEnd();
        }

        function handleEnd() {
            $status.html('TRẬN ĐẤU KẾT THÚC!');
            let fInt = Math.min(500, Math.max(100, (accurateMoves / (totalMoves || 1)) * 350 + 150));
            let fTac = Math.min(500, Math.max(100, (tacticalMoves * 45) + 120));
            let fBiq = Math.min(500, Math.max(100, 500 - ((totalThinkTime / (totalMoves || 1)) * 30)));
            let fExp = Math.min(500, Math.max(100, (totalMoves * 15) + 100));

            $('#int-val').html(Math.round(fInt)+" pt"); $('#int-bar').css('width', (fInt/500)*100+'%');
            $('#biq-val').html(Math.round(fBiq)+" pt"); $('#biq-bar').css('width', (fBiq/500)*100+'%');
            $('#tac-val').html(Math.round(fTac)+" pt"); $('#tac-bar').css('width', (fTac/500)*100+'%');
            $('#exp-val').html(Math.round(fExp)+" pt"); $('#exp-bar').css('width', (fExp/500)*100+'%');
            $('#predicted-rank').html("MASTER").css('color', '#eab308');
        }

        function resetGame() {
            game.reset(); board.start(); totalMoves = 0; tacticalMoves = 0; accurateMoves = 0; totalThinkTime = 0;
            ['int', 'biq', 'tac', 'exp'].forEach(id => { $(`#${id}-val`).html("0"); $(`#${id}-bar`).css('width', '0%'); });
            $('#predicted-rank').html("CHƯA XÁC ĐỊNH").css('color', '#475569');
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
        }
    </script>
</body>
</html>
