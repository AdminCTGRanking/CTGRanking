<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessTier | Complete Bot Analyzer</title>
    <script src="https://cdn.tailwindcss.org"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboardjs/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Inter', sans-serif; }
        .stat-panel { background: #11141d; border: 1px solid #2d3142; }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center min-h-screen">

    <div id="login-screen" class="max-w-md w-full p-8 rounded-xl stat-panel text-center space-y-6 shadow-2xl border border-zinc-800">
        <h2 class="text-2xl font-black tracking-widest text-zinc-300 uppercase">CHESS<span class="text-yellow-500">TIER</span> BOT</h2>
        <p class="text-xs text-zinc-500 uppercase tracking-wider font-bold">Vui lòng nhập tên của bạn để lưu chỉ số AI</p>
        
        <input type="text" id="playerNameInput" placeholder="TÊN CỦA BẠN..." 
            class="w-full bg-zinc-950 border border-zinc-800 rounded-lg py-3 px-4 text-sm font-bold tracking-widest text-center focus:outline-none focus:border-yellow-500 transition-colors uppercase text-zinc-200">
        
        <button onclick="startGameWithPlayer()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-3 rounded-lg transition-colors tracking-widest text-sm uppercase">
            Bắt đầu đấu
        </button>

        <div class="pt-2 border-t border-zinc-800/60">
            <a href="index.html" class="text-xs text-zinc-500 font-bold hover:text-zinc-300 transition-colors uppercase tracking-wider block">
                ← Quay lại Bảng xếp hạng
            </a>
        </div>
    </div>

    <div id="game-screen" class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-12 gap-8 items-center hidden">
        <div class="md:col-span-7 flex flex-col items-center">
            <h2 class="text-xl font-black uppercase tracking-wider mb-4 text-zinc-400">Hệ Thống Đánh Giá Chỉ Số AI</h2>
            <div id="myBoard" class="w-full max-w-[460px] shadow-2xl rounded-lg overflow-hidden border-4 border-zinc-800"></div>
            <p id="status" class="mt-4 text-sm font-semibold text-yellow-500">Đến lượt bạn...</p>
        </div>

        <div class="md:col-span-5 space-y-4">
            <div class="p-6 rounded-xl stat-panel space-y-4">
                <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
                    <h3 id="display-name" class="text-md font-black uppercase text-zinc-200 tracking-wide">PLAYER</h3>
                    <a href="index.html" class="text-[9px] bg-zinc-800 text-zinc-400 font-bold px-2 py-1 rounded uppercase hover:bg-zinc-700 transition-colors">BXH 主</a>
                </div>
                
                <div>
                    <div class="flex justify-between text-[11px] font-bold text-zinc-500 mb-1">
                        <span>🧠 INT (Intelligence)</span>
                        <span id="int-val" class="text-blue-400 font-bold">0</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="int-bar" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div></div>
                </div>

                <div>
                    <div class="flex justify-between text-[11px] font-bold text-zinc-500 mb-1">
                        <span>⚡ BIQ (Battle IQ)</span>
                        <span id="biq-val" class="text-red-400 font-bold">0</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="biq-bar" class="bg-red-500 h-full w-0 transition-all duration-1000"></div></div>
                </div>

                <div>
                    <div class="flex justify-between text-[11px] font-bold text-zinc-500 mb-1">
                        <span>🎯 TAC (Tactics)</span>
                        <span id="tac-val" class="text-yellow-400 font-bold">0</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="tac-bar" class="bg-yellow-500 h-full w-0 transition-all duration-1000"></div></div>
                </div>

                <div>
                    <div class="flex justify-between text-[11px] font-bold text-zinc-500 mb-1">
                        <span>🔥 EXP (Experience)</span>
                        <span id="exp-val" class="text-emerald-400 font-bold">0</span>
                    </div>
                    <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="exp-bar" class="bg-emerald-500 h-full w-0 transition-all duration-1000"></div></div>
                </div>

                <div class="mt-6 pt-4 border-t border-zinc-800 text-center">
                    <span class="text-[10px] text-zinc-500 block uppercase font-bold tracking-widest">Dự đoán cấp bậc</span>
                    <div id="predicted-rank" class="text-2xl font-black text-zinc-700 mt-1 italic">CHƯA XÁC ĐỊNH</div>
                </div>
            </div>

            <button onclick="resetGame()" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-lg transition-colors tracking-wider text-xs uppercase">
                Chơi ván mới
            </button>
        </div>
    </div>

    <script>
        let board = null;
        let game = new Chess();
        let $status = $('#status');
        let playerName = "";
        
        let totalMoves = 0;
        let tacticalMoves = 0;
        let accurateMoves = 0;
        let lastMoveTime = Date.now();
        let totalThinkTime = 0;

        window.startGameWithPlayer = function() {
            let inputName = $('#playerNameInput').val().trim();
            if (!inputName) { alert("Vui lòng không bỏ trống tên!"); return; }
            playerName = inputName;
            $('#display-name').html(playerName);
            
            $('#login-screen').addClass('hidden');
            $('#game-screen').removeClass('hidden');
            
            // Xóa căn giữa màn hình của body để giao diện game hiển thị đẹp mắt ở trên cùng
            $('body').removeClass('flex items-center justify-center min-h-screen').addClass('block');
            
            initChessBoard();
        }

        function initChessBoard() {
    board = Chessboard('myBoard', {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        
        // ĐOẠN CẦN THÊM: Chỉ đường dẫn về thư mục asset của bạn
        // {piece} sẽ tự động được thư viện thay thế bằng "wP", "bK", v.v...
        pieceTheme: 'assets/img/chesspieces/wikipedia/{piece}.png' 
    });
    lastMoveTime = Date.now();
    $status.html(`Đến lượt bạn (${playerName})...`);
}

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeBotMove() {
            let possibleMoves = game.moves();
            if (game.game_over()) { calculateFinalStats(); return; }

            let randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
            
            if (game.game_over()) calculateFinalStats();
        }

        function onDrop (source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            let thinkTime = (Date.now() - lastMoveTime) / 1000;
            totalThinkTime += thinkTime;
            totalMoves++;

            if (move.captured) tacticalMoves += 1; 
            if (move.san.includes('+')) tacticalMoves += 1;
            if (!move.captured && thinkTime < 3) accurateMoves += 1;

            $status.html('Bot đang suy nghĩ...');
            window.setTimeout(makeBotMove, 600);
        }

        function onSnapEnd () { board.position(game.fen()); }

        function calculateFinalStats() {
            $status.html('TRẬN ĐẤU KẾT THÚC! ĐANG TÍNH TOÁN...');

            let finalInt = Math.min(500, Math.max(100, (accurateMoves / (totalMoves || 1)) * 350 + 150));
            let finalTac = Math.min(500, Math.max(100, (tacticalMoves * 45) + 120));
            let avgTime = totalThinkTime / (totalMoves || 1);
            let finalBiq = Math.min(500, Math.max(100, 500 - (avgTime * 30)));
            let finalExp = Math.min(500, Math.max(100, (totalMoves * 15) + 100));

            updateUI('int', finalInt);
            updateUI('biq', finalBiq);
            updateUI('tac', finalTac);
            updateUI('exp', finalExp);

            let totalElo = finalInt + finalBiq + finalTac + finalExp;
            let rank = "BEGINNER";
            if (totalElo >= 1500) rank = "MASTER";
            else if (totalElo >= 1000) rank = "SEMI MASTER";
            else if (totalElo >= 600) rank = "PRO";

            $('#predicted-rank').html(rank).addClass('text-yellow-500 text-3xl font-black animate-pulse');
        }

        function updateUI(id, val) {
            let rounded = Math.round(val);
            $(`#${id}-val`).html(rounded + " pt");
            $(`#${id}-bar`).css('width', (val / 500) * 100 + '%');
        }

        function resetGame() {
            game.reset(); board.start();
            totalMoves = 0; tacticalMoves = 0; accurateMoves = 0; totalThinkTime = 0;
            ['int', 'biq', 'tac', 'exp'].forEach(id => {
                $(`#${id}-val`).html("0"); $(`#${id}-bar`).css('width', '0%');
            });
            $('#predicted-rank').html("CHƯA XÁC ĐỊNH").removeClass('text-yellow-500 text-3xl font-black animate-pulse');
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
        }
    </script>
</body>
</html>
