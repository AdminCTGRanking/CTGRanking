<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessTier Bot | AI Analyzer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            background-color: #0b0e14 !important; 
            color: #ffffff !important; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .grid-layout { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px; 
            box-sizing: border-box;
        }
        @media (min-width: 768px) { 
            .grid-layout { flex-direction: row !important; align-items: center; } 
        }

        .col-board { 
            flex: 1.2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .col-stats { 
            flex: 0.8; 
            width: 100%; 
        }

        .stat-panel { 
            background: #11141d; 
            border: 1px solid #2d3142; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .flex-between { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }

        .bar-bg { 
            width: 100%; 
            background-color: #1e293b; 
            height: 8px; 
            border-radius: 4px; 
            overflow: hidden; 
            margin-top: 4px;
        }
        .bar-fill { 
            height: 100%; 
            width: 0%; 
            border-radius: 4px;
            transition: width 0.5s ease-in-out; 
        }

        /* KHUNG CHỨA BÀN CỜ ĐẢM BẢO HIỂN THỊ ĐẸP MẮT */
        #myBoard { 
            width: 100% !important; 
            max-width: 420px; 
            min-width: 280px; 
            margin: 0 auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px solid #2d3142;
            border-radius: 6px;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        .btn-main { 
            width: 100%; 
            background-color: #eab308; 
            color: #000000; 
            font-weight: bold; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase; 
            font-size: 13px; 
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .btn-main:hover { background-color: #ca8a04; }

        .input-field { 
            width: 100%; 
            background-color: #030712; 
            border: 1px solid #1f2937; 
            padding: 14px; 
            border-radius: 8px; 
            color: #ffffff; 
            text-align: center; 
            margin-bottom: 15px; 
            font-size: 14px;
            box-sizing: border-box; 
        }
        
        a.back-link {
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        a.back-link:hover { color: #eab308; }
    </style>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
</head>
<body>

    <div id="login-screen" class="stat-panel" style="width: 100%; max-width: 380px; text-align: center; margin: auto;">
        <a href="index.html" class="back-link">← Quay lại Bảng xếp hạng</a>
        <h2 style="color: #eab308; letter-spacing: 2px; margin: 0 0 8px 0; font-size: 24px;">CHESSTIER BOT</h2>
        <p style="font-size: 11px; color: #94a3b8; margin: 0 0 25px 0; font-weight: bold;">NHẬP TÊN ĐỂ PHÂN TÍCH CHỈ SỐ AI</p>
        
        <input type="text" id="playerNameInput" placeholder="TÊN CỦA BẠN..." class="input-field">
        <button onclick="startGameWithPlayer()" class="btn-main">Bắt đầu đấu</button>
    </div>

    <div id="game-screen" class="grid-layout hidden">
        <div class="col-board">
            <h3 style="color: #94a3b8; margin: 0 0 20px 0; font-size: 16px; letter-spacing: 1px; font-weight: 800;">HỆ THỐNG ĐÁNH GIÁ CHỈ SỐ AI</h3>
            <div id="myBoard"></div>
            <p id="status" style="color: #eab308; font-weight: bold; margin: 20px 0 0 0; font-size: 14px;">Đến lượt bạn...</p>
        </div>

        <div class="col-stats">
            <div class="stat-panel">
                <div class="flex-between" style="border-bottom: 1px solid #2d3142; padding-bottom: 12px; margin-bottom: 20px;">
                    <span id="display-name" style="font-weight: bold; color: #f1f5f9; font-size: 16px;">PLAYER</span>
                    <span style="font-size: 10px; background: #2d3142; color: #94a3b8; padding: 4px 10px; border-radius: 4px; font-weight: bold;">BOT AI V1.0</span>
                </div>

                <div style="margin-bottom: 15px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8; font-weight: 600;"><span>🧠 INT (Intelligence)</span><span id="int-val" style="color:#3b82f6; font-weight: bold;">0</span></div>
                    <div class="bar-bg"><div id="int-bar" class="bar-fill" style="background: #3b82f6;"></div></div>
                </div>

                <div style="margin-bottom: 15px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8; font-weight: 600;"><span>⚡ BIQ (Battle IQ)</span><span id="biq-val" style="color:#ef4444; font-weight: bold;">0</span></div>
                    <div class="bar-bg"><div id="biq-bar" class="bar-fill" style="background: #ef4444;"></div></div>
                </div>

                <div style="margin-bottom: 15px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8; font-weight: 600;"><span>🎯 TAC (Tactics)</span><span id="tac-val" style="color:#eab308; font-weight: bold;">0</span></div>
                    <div class="bar-bg"><div id="tac-bar" class="bar-fill" style="background: #eab308;"></div></div>
                </div>

                <div style="margin-bottom: 20px;">
                    <div class="flex-between" style="font-size: 12px; color: #94a3b8; font-weight: 600;"><span>🔥 EXP (Experience)</span><span id="exp-val" style="color:#10b981; font-weight: bold;">0</span></div>
                    <div class="bar-bg"><div id="exp-bar" class="bar-fill" style="background: #10b981;"></div></div>
                </div>

                <div style="text-align: center; border-top: 1px solid #2d3142; padding-top: 18px; margin-top: 10px;">
                    <span style="font-size: 10px; color: #64748b; font-weight: bold; letter-spacing: 1px;">DỰ ĐOÁN CẤP BẬC</span>
                    <div id="predicted-rank" style="font-size: 22px; font-weight: 900; color: #475569; margin-top: 6px; font-style: italic;">CHƯA XÁC ĐỊNH</div>
                </div>
            </div>
            
            <button onclick="resetGame()" class="btn-main" style="background:#2d3142; color:#fff; margin-top: 15px; font-size: 12px;">Chơi ván mới</button>
        </div>
    </div>

    <script>
        let board = null;
        let game = new Chess();
        let $status = $('#status');
        let playerName = "";
        let totalMoves = 0, tacticalMoves = 0, accurateMoves = 0, totalThinkTime = 0, lastMoveTime = Date.now();

        function startGameWithPlayer() {
            let inputName = $('#playerNameInput').val().trim();
            if (!inputName) { alert("Vui lòng nhập tên tài khoản!"); return; }
            playerName = inputName;
            $('#display-name').html(playerName.toUpperCase());
            $('#login-screen').addClass('hidden');
            $('#game-screen').removeClass('hidden');
            
            // Kích hoạt bàn cờ sau khi đổi màn hình
            setTimeout(initChessBoard, 150);
        }

        function initChessBoard() {
            board = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                onDragStart: (src, pc) => !game.game_over() && pc.search(/^b/) === -1,
                onDrop: (src, tgt) => {
                    let move = game.move({ from: src, to: tgt, promotion: 'q' });
                    if (move === null) return 'snapback';
                    
                    let thinkTime = (Date.now() - lastMoveTime) / 1000;
                    totalThinkTime += thinkTime; totalMoves++;
                    if (move.captured || move.san.includes('+')) tacticalMoves++;
                    if (!move.captured && thinkTime < 3) accurateMoves++;

                    $status.html('Bot đang tính toán nước đi...');
                    setTimeout(makeBotMove, 600);
                },
                onSnapEnd: () => board.position(game.fen()),
                // Tải trực tiếp ảnh quân cờ tiêu chuẩn từ dữ liệu đám mây chính thức của ChessboardJS
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            
            lastMoveTime = Date.now();
        }

        function makeBotMove() {
            let moves = game.moves();
            if (game.game_over()) { handleEnd(); return; }
            
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
            if (game.game_over()) handleEnd();
        }

        function handleEnd() {
            $status.html('TRẬN ĐẤU KẾT THÚC!');
            let fInt = Math.min(500, Math.max(100, (accurateMoves / (totalMoves || 1)) * 350 + 150));
            let fTac = Math.min(500, Math.max(100, (tacticalMoves * 45) + 120));
            let fBiq = Math.min(500, Math.max(100, 500 - ((totalThinkTime / (totalMoves || 1)) * 30)));
            let fExp = Math.min(500, Math.max(100, (totalMoves * 15) + 100));

            $('#int-val').html(Math.round(fInt)+" pt"); $('#int-bar').css('width', (fInt/500)*100+'%');
            $('#biq-val').html(Math.round(fBiq)+" pt"); $('#biq-bar').css('width', (fBiq/500)*100+'%');
            $('#tac-val').html(Math.round(fTac)+" pt"); $('#tac-bar').css('width', (fTac/500)*100+'%');
            $('#exp-val').html(Math.round(fExp)+" pt"); $('#exp-bar').css('width', (fExp/500)*100+'%');
            
            let totalElo = fInt + fBiq + fTac + fExp;
            let rank = "BEGINNER";
            if (totalElo >= 1500) rank = "MASTER";
            else if (totalElo >= 1000) rank = "SEMI MASTER";
            else if (totalElo >= 600) rank = "PRO";
            
            $('#predicted-rank').html(rank).css('color', '#eab308');
        }

        function resetGame() {
            game.reset(); board.start(); totalMoves = 0; tacticalMoves = 0; accurateMoves = 0; totalThinkTime = 0;
            ['int', 'biq', 'tac', 'exp'].forEach(id => { $(`#${id}-val`).html("0"); $(`#${id}-bar`).css('width', '0%'); });
            $('#predicted-rank').html("CHƯA XÁC ĐỊNH").css('color', '#475569');
            $status.html(`Đến lượt bạn (${playerName})...`);
            lastMoveTime = Date.now();
        }
    </script>
</body>
</html>
